AWSTemplateFormatVersion: '2010-09-09'
Description: Project 4 - CI/CD Dev/Prod Lambda Setup

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod
    Default: dev

Resources:
  UploadsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "UploadsLambda-${Environment}"
      Handler: index.handler
      Runtime: python3.11
      Role: arn:aws:iam::825765402564:role/LambdaExecutionRole-Project4

      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Hello from Lambda (${Environment})"
              }

      Environment:
        Variables:
          TABLE_NAME: !Sub "UploadsTable-${Environment}"
