AWSTemplateFormatVersion: '2010-09-09'
Description: Project 4 - Serverless File Upload System (Dev/Prod)

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod
    Default: dev

Resources:

  UploadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "UploadsTable-${Environment}"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  UploadsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "UploadsLambda-${Environment}"
      Handler: index.handler
      Runtime: python3.11
      Role: arn:aws:iam::825765402564:role/LambdaExecutionRole-Project4

      Code:
        ZipFile: |
          import json
          import boto3
          import os

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def handler(event, context):
              for record in event['Records']:
                  file_name = record['s3']['object']['key']

                  table.put_item(
                      Item={
                          'id': file_name
                      }
                  )

              return {
                  "statusCode": 200,
                  "body": "File processed"
              }

      Environment:
        Variables:
          TABLE_NAME: !Ref UploadsTable

  S3InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UploadsLambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      # 🔥 FIX: removed SourceArn to break circular dependency

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "uploads-bucket-${Environment}-${AWS::AccountId}"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:Put
            Function: !GetAtt UploadsLambda.Arn
